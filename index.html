<script>
    // Audio Context ko user ke pehle touch par resume karne ka function
    function initAudioOnFirstTouch() {
        if (S.audioCtx.state === 'suspended') {
            S.audioCtx.resume().then(() => {
                console.log("Audio Context Activated Securely on GitHub Pages");
            });
        }
    }
    // Screen par kahin bhi touch ya click hote hi audio chalu ho jayega
    window.addEventListener('click', initAudioOnFirstTouch, { once: true });
    window.addEventListener('touchstart', initAudioOnFirstTouch, { once: true });
</script>
